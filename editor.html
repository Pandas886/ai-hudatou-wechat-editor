<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 胡大头 Editor · 公众号排版工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ── Custom Fonts ── */
@font-face {
  font-family: 'Huiwen Mincho';
  src: url('HuiwenMincho.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Xiaolai';
  src: url('Xiaolai.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

/* ── Reset & Base ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #F4D758;
  --accent: #2B7FD8;
  --orange: #F7A946;
  --cream: #fefcf6;
  --dark: #1a1a1a;
  --text: #1a1a1a;
  --text-muted: #888;
  --bg: #f5f3ef;
  --border: #e8e4dc;
}

body {
  background: var(--bg);
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
}

/* ── Toolbar ── */
.toolbar {
  background: #fff;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 6px;
  position: relative;
  z-index: 10;
}

.toolbar-brand {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 15px;
  color: var(--dark);
  letter-spacing: -0.5px;
  margin-right: 16px;
  white-space: nowrap;
}

.toolbar-brand span {
  color: var(--accent);
}

.toolbar-sep {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 8px;
}

.toolbar-btn {
  background: none;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  color: #555;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
}

.toolbar-btn:hover {
  background: #f0eee8;
  border-color: var(--border);
  color: var(--dark);
}

.toolbar-btn .icon {
  font-size: 14px;
}

.toolbar-select {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 11px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: #fff;
  color: var(--text);
  cursor: pointer;
  outline: none;
}
.toolbar-select:hover { border-color: var(--accent); }

.toolbar-spacer { flex: 1; }

.toolbar-btn.export {
  background: var(--primary);
  color: var(--dark);
  font-weight: 600;
  border-color: #e5c84e;
}

.toolbar-btn.export:hover {
  background: #e8cb4c;
}

/* ── Toast ── */
.toast {
  position: fixed;
  top: 64px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--dark);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 999;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Main Layout ── */
.main {
  display: flex;
  height: calc(100vh - 52px);
}

.editor-pane {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}

.editor-pane-header {
  padding: 10px 16px 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  background: #faf9f6;
}

#editor {
  flex: 1;
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  padding: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  color: var(--dark);
  background: #fff;
  tab-size: 2;
}

#editor::placeholder {
  color: #ccc;
}

.preview-pane {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--bg);
  overflow-y: auto;
  padding: 24px 16px 60px;
}

/* ── Phone Frame ── */
.phone-frame {
  width: 375px;
  min-width: 375px;
  background: var(--cream);
  border-radius: 20px;
  box-shadow:
    0 1px 2px rgba(0,0,0,0.04),
    0 4px 12px rgba(0,0,0,0.06),
    0 20px 60px rgba(0,0,0,0.10);
  overflow: visible;
}

.phone-content {
  padding: 28px 20px 40px;
}

/* ── Mobile ── */
@media (max-width: 800px) {
  .main {
    flex-direction: column;
  }
  .editor-pane {
    border-right: none;
    border-bottom: 1px solid var(--border);
    max-height: 40vh;
  }
  .preview-pane {
    padding: 16px 8px 40px;
  }
  .phone-frame {
    width: 100%;
    min-width: unset;
    border-radius: 0;
    box-shadow: none;
  }
  .toolbar {
    overflow-x: auto;
  }
}

/* ════════════════════════════════════════
   Preview Component Styles
   ════════════════════════════════════════ */

/* ── Spacing ── */
.nr-component {
  margin-bottom: 24px;
}

.nr-component:last-child {
  margin-bottom: 0;
}

/* ── Body text ── */
.nr-body {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text);
  font-weight: 400;
}

/* ── H1 ── */
.nr-h1 {
  font-family: 'Huiwen Mincho', 'Noto Serif SC', serif;
  font-weight: 900;
  font-size: 30px;
  line-height: 1.35;
  color: var(--text);
  letter-spacing: -0.5px;
}

.nr-h1 .highlight {
  background: linear-gradient(to top, #F4D758 28%, transparent 28%);
}

/* ── Subtitle (blockquote after h1) ── */
.nr-subtitle {
  margin-top: 14px;
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 400;
  line-height: 1.5;
}

/* ── H2 ── */
.nr-h2 {
  font-family: 'Huiwen Mincho', 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 22px;
  line-height: 1.4;
  color: var(--text);
  padding-bottom: 8px;
  border-bottom: 3px solid var(--primary);
  display: inline-block;
}

/* ── H3 ── */
.nr-h3 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  padding-left: 12px;
  border-left: 3px solid var(--accent);
  line-height: 1.4;
}

/* ── Divider ── */
.nr-divider {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 8px 0;
}

/* ── Chat ── */
.nr-chat {
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
}

.nr-chat-titlebar {
  background: #f0f0f0;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nr-chat-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.nr-chat-dot.red    { background: #ff5f57; }
.nr-chat-dot.yellow { background: #febc2e; }
.nr-chat-dot.green  { background: #28c840; }

.nr-chat-title {
  flex: 1;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: #666;
  margin-right: 38px;
}

.nr-chat-body {
  background: #fafafa;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.nr-chat-row {
  display: flex;
  flex-direction: column;
  max-width: 82%;
}

.nr-chat-row.left  { align-self: flex-start; }
.nr-chat-row.right { align-self: flex-end; }

.nr-chat-name {
  font-size: 10px;
  color: #999;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: 0.3px;
}

.nr-chat-row.left .nr-chat-name  { padding-left: 4px; }
.nr-chat-row.right .nr-chat-name { padding-right: 4px; text-align: right; }

.nr-chat-bubble {
  font-size: 13px;
  line-height: 1.55;
  padding: 10px 14px;
}

.nr-chat-row.left .nr-chat-bubble {
  background: #2B7FD8;
  color: #fff;
  border-radius: 14px 14px 14px 4px;
}

.nr-chat-row.right .nr-chat-bubble {
  background: #F4D758;
  color: #1a1a1a;
  border-radius: 14px 14px 4px 14px;
}

/* ── Quote ── */
.nr-quote {
  background: linear-gradient(135deg, #1e6fc0 0%, #2B7FD8 100%);
  border: 2px dashed rgba(255,255,255,0.35);
  border-radius: 14px 14px 14px 4px;
  padding: 22px 20px 18px;
  position: relative;
  overflow: hidden;
}

.nr-quote::before {
  content: '\201c';
  font-family: 'Caveat', cursive;
  font-size: 36px;
  color: rgba(255,255,255,0.25);
  position: absolute;
  top: 8px;
  left: 14px;
  line-height: 1;
}

.nr-quote-tag {
  font-size: 10px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
  margin-left: 28px;
}

.nr-quote-text {
  font-size: 12.5px;
  color: #fff;
  line-height: 1.65;
  margin-bottom: 14px;
  font-weight: 400;
}

.nr-quote-source {
  font-size: 9.5px;
  color: rgba(255,255,255,0.5);
  text-align: right;
  font-weight: 500;
}

/* ── Terminal ── */
@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

.nr-terminal {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 20px rgba(0,0,0,0.15);
}

.nr-terminal-header {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.04);
}

.nr-terminal-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
}

.nr-terminal-body {
  padding: 22px 20px 20px;
}

.nr-terminal-prompt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nr-terminal-prompt .arrow {
  color: #28c840;
  font-size: 13px;
}

.nr-terminal-quote {
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
  color: #e8e8e8;
  line-height: 1.55;
  font-weight: 500;
  display: inline;
}

.nr-terminal-cursor {
  display: inline-block;
  width: 9px;
  height: 18px;
  background: #F4D758;
  vertical-align: text-bottom;
  margin-left: 2px;
  border-radius: 1px;
  animation: blink 1s step-end infinite;
}

.nr-terminal-brand {
  margin-top: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.18);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

/* ── Sticker ── */
.nr-sticker {
  text-align: center;
  padding: 8px 0;
}

.nr-sticker img {
  width: 160px;
  height: auto;
  border-radius: 16px;
}

/* ── CTA ── */
.nr-cta {
  text-align: center;
  padding: 8px 0;
}

.nr-cta a, .nr-cta span {
  display: inline-block;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 28px;
  border-radius: 24px;
  text-decoration: none;
  cursor: pointer;
  border: none;
  letter-spacing: 0.3px;
}

.nr-cta .cta-yellow {
  background: #F4D758;
  color: #1a1a1a;
}

.nr-cta .cta-blue {
  background: #2B7FD8;
  color: #fff;
}

/* ── Blockquote (generic) ── */
.nr-blockquote {
  font-size: 14px;
  color: #555;
  border-left: 3px solid var(--border);
  padding-left: 14px;
  line-height: 1.65;
  font-style: italic;
}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-brand"><span>AI 胡大头</span> Editor</div>
  <div class="toolbar-sep"></div>
  <button class="toolbar-btn" onclick="insertTemplate('heading')"><span class="icon">📝</span> 标题</button>
  <button class="toolbar-btn" onclick="insertTemplate('chat')"><span class="icon">💬</span> 对话</button>
  <button class="toolbar-btn" onclick="insertTemplate('quote')"><span class="icon">📌</span> 引用</button>
  <button class="toolbar-btn" onclick="insertTemplate('terminal')"><span class="icon">💻</span> 终端</button>
  <button class="toolbar-btn" onclick="insertTemplate('sticker')"><span class="icon">🖼️</span> 贴纸</button>
  <button class="toolbar-btn" onclick="insertTemplate('cta')"><span class="icon">🔘</span> 按钮</button>
  <button class="toolbar-btn" onclick="insertTemplate('divider')"><span class="icon">➖</span> 分隔线</button>
  <button class="toolbar-btn" onclick="insertImage()"><span class="icon">🖼</span> 图片</button>
  <div class="toolbar-sep"></div>
  <select class="toolbar-select" id="fontHeading" onchange="changeFont('heading', this.value)" title="标题字体">
    <option value="huiwen" selected>标题：汇文明朝</option>
    <option value="noto-serif">标题：Noto Serif</option>
    <option value="xiaolai">标题：小赖</option>
    <option value="noto-sans">标题：Noto Sans</option>
  </select>
  <select class="toolbar-select" id="fontBody" onchange="changeFont('body', this.value)" title="正文字体">
    <option value="noto-sans" selected>正文：Noto Sans</option>
    <option value="xiaolai">正文：小赖</option>
    <option value="huiwen">正文：汇文明朝</option>
    <option value="noto-serif">正文：Noto Serif</option>
  </select>
  <div class="toolbar-sep"></div>
  <button class="toolbar-btn" onclick="doUndo()" title="撤回 (Ctrl+Z)"><span class="icon">↩️</span> 撤回</button>
  <div class="toolbar-spacer"></div>
  <button class="toolbar-btn export" onclick="exportToClipboard()">📋 复制到公众号</button>
  <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
</div>

<!-- Main Layout -->
<div class="main">
  <div class="editor-pane">
    <div class="editor-pane-header">Markdown 编辑区</div>
    <textarea id="editor" spellcheck="false" placeholder="在这里输入 Markdown 内容..."></textarea>
  </div>
  <div class="preview-pane">
    <div class="phone-frame">
      <div class="phone-content" id="preview"></div>
    </div>
  </div>
</div>

<script>
// ── Identity defaults ──
const AUTHOR_NAME = '胡大头';
const AI_NAME = 'sootie';
const BRAND_NAME = 'AI 胡大头';
const STICKER_IMAGE = 'https://cdn.jsdelivr.net/gh/Pandas886/picx-images-hosting@master/20260424100743291.png';

function normalizeLegacyIdentity(text) {
  return text
    .replace(/关注不赶时间NORUSH/g, '关注AI 胡大头')
    .replace(/不赶时间NORUSH/g, BRAND_NAME)
    .replace(/norush · 不赶时间/g, BRAND_NAME)
    .replace(/NORUSH/g, BRAND_NAME)
    .replace(/\bCola\b/g, AI_NAME)
    .replace(/\bcola\b/g, AI_NAME)
    .replace(/不二/g, AUTHOR_NAME)
    .replace(/!\[sticker\]\(ip-avatar\.jpg\)/g, `![sticker](${STICKER_IMAGE})`);
}

function migrateEditorIdentity() {
  const editor = document.getElementById('editor');
  const normalized = normalizeLegacyIdentity(editor.value);
  if (normalized !== editor.value) {
    editor.value = normalized;
    lastSavedValue = normalized;
  }
  return normalized;
}

// ── Templates ──
const templates = {
  heading: "# 标题文字",
  chat: "```chat\n我：你好呀\nsootie：你好！有什么可以帮你的吗？\n```",
  quote: "```quote\nlabel: Quote · 观点引用\ntext: 在这里输入引用内容。\nsource: — 来源\n```",
  terminal: "```terminal\nprompt: sootie --think\ntext: 在这里输入金句。\nfooter: AI 胡大头\n```",
  sticker: "![sticker](https://cdn.jsdelivr.net/gh/Pandas886/picx-images-hosting@master/20260424100743291.png)",
  cta: "[CTA:按钮文字](https://mp.weixin.qq.com){yellow}",
  divider: "---"
};

// ── Initial Content ──
const initialContent = `# 她是**放大器**，不是发生器
> 当 AI 不再是工具，而是搭档

---

\`\`\`chat
我：我想搭一套内容工作流，但不确定从哪开始。
sootie：你现在的内容创作最卡在哪一步？
我：都卡。想法太多，落到执行就散了。
sootie：那我们先聊你有哪几条内容线。
\`\`\`

\`\`\`quote
label: McKinsey 60/40 法则
text: AI 能高质量完成 60% 的基础工作，但剩下 <strong>40% 的审美、判断和创意</strong>，决定最终价值。
source: — McKinsey Global Institute
\`\`\`

\`\`\`terminal
prompt: sootie --think
text: 人 + Agent，才是未来的个体。
footer: AI 胡大头
\`\`\`

[CTA:关注AI 胡大头](https://mp.weixin.qq.com){yellow}`;

// ── Debounce ──
function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Insert Template ──
function insertTemplate(type) {
  const ed = document.getElementById('editor');
  const start = ed.selectionStart;
  const end = ed.selectionEnd;
  const val = ed.value;
  const selected = val.substring(start, end).trim();

  let insert;

  if (selected) {
    // 有选区：把选中文字转换为对应组件格式
    insert = wrapSelection(type, selected);
  } else {
    // 无选区：插入空模板
    insert = templates[type];
  }

  const prefix = (start > 0 && val[start - 1] !== '\n') ? '\n\n' : (start > 0 ? '\n' : '');
  const suffix = '\n';
  const full = prefix + insert + suffix;
  saveUndoState();
  ed.value = val.substring(0, start) + full + val.substring(end);
  lastSavedValue = ed.value;
  ed.selectionStart = ed.selectionEnd = start + full.length;
  ed.focus();
  render();
}

function wrapSelection(type, text) {
  const lines = text.split('\n').filter(l => l.trim());

  switch (type) {
    case 'heading':
      return '# ' + lines[0];

    case 'chat': {
      // 自动交替分配"我"和 AI 角色
      const chatLines = lines.map((line, i) => {
        const clean = line.replace(/^(我|me|胡大头|sootie)\s*[:：]\s*/i, '');
        // 如果原文已有角色前缀就保留，否则交替分配
        if (/^(我|me|胡大头)\s*[:：]/i.test(line)) return '我：' + clean;
        if (/^sootie\s*[:：]/i.test(line)) return 'sootie：' + clean;
        return (i % 2 === 0 ? '我：' : 'sootie：') + clean;
      });
      return '```chat\n' + chatLines.join('\n') + '\n```';
    }

    case 'quote': {
      // 第一行当标签，其余当引用文字
      const label = lines.length > 1 ? lines[0] : '引用来源';
      const body = lines.length > 1 ? lines.slice(1).join(' ') : lines[0];
      return '```quote\nlabel: ' + label + '\ntext: ' + body + '\nsource: — 来源\n```';
    }

    case 'terminal':
      return '```terminal\nprompt: sootie --think\ntext: ' + lines.join(' ') + '\nfooter: AI 胡大头\n```';

    case 'sticker':
      return '![sticker](https://cdn.jsdelivr.net/gh/Pandas886/picx-images-hosting@master/20260424100743291.png)';

    case 'cta':
      return '[CTA:' + lines[0] + '](链接){yellow}';

    case 'divider':
      return '---';

    default:
      return text;
  }
}

// ── Inline formatting ──
function inlineFormat(text) {
  // Bold → highlight span
  text = text.replace(/\*\*(.+?)\*\*/g, '<span class="highlight">$1</span>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  return text;
}

// ── Parse & Render ──
function render() {
  const src = migrateEditorIdentity();
  const lines = src.split('\n');
  let html = '';
  let i = 0;
  let lastWasH1 = false;

  while (i < lines.length) {
    const line = lines[i];

    // Skip empty lines
    if (line.trim() === '') {
      lastWasH1 = false;
      i++;
      continue;
    }

    // Fenced blocks
    if (line.trim().startsWith('```chat')) {
      const block = [];
      i++;
      while (i < lines.length && !lines[i].trim().startsWith('```')) {
        block.push(lines[i]);
        i++;
      }
      i++; // skip closing ```
      html += renderChat(block);
      lastWasH1 = false;
      continue;
    }

    if (line.trim().startsWith('```quote')) {
      const block = [];
      i++;
      while (i < lines.length && !lines[i].trim().startsWith('```')) {
        block.push(lines[i]);
        i++;
      }
      i++;
      html += renderQuote(block);
      lastWasH1 = false;
      continue;
    }

    if (line.trim().startsWith('```terminal')) {
      const block = [];
      i++;
      while (i < lines.length && !lines[i].trim().startsWith('```')) {
        block.push(lines[i]);
        i++;
      }
      i++;
      html += renderTerminal(block);
      lastWasH1 = false;
      continue;
    }

    // Divider
    if (line.trim() === '---' || line.trim() === '***') {
      html += '<div class="nr-component"><hr class="nr-divider"></div>';
      lastWasH1 = false;
      i++;
      continue;
    }

    // H1
    if (/^# (.+)/.test(line.trim())) {
      const m = line.trim().match(/^# (.+)/);
      html += '<div class="nr-component"><div class="nr-h1">' + inlineFormat(m[1]) + '</div></div>';
      lastWasH1 = true;
      i++;
      continue;
    }

    // H2
    if (/^## (.+)/.test(line.trim())) {
      const m = line.trim().match(/^## (.+)/);
      html += '<div class="nr-component"><div class="nr-h2">' + inlineFormat(m[1]) + '</div></div>';
      lastWasH1 = false;
      i++;
      continue;
    }

    // H3
    if (/^### (.+)/.test(line.trim())) {
      const m = line.trim().match(/^### (.+)/);
      html += '<div class="nr-component"><div class="nr-h3">' + inlineFormat(m[1]) + '</div></div>';
      lastWasH1 = false;
      i++;
      continue;
    }

    // Blockquote (subtitle if after h1)
    if (/^> (.+)/.test(line.trim())) {
      const m = line.trim().match(/^> (.+)/);
      if (lastWasH1) {
        html += '<div class="nr-component"><p class="nr-subtitle">' + inlineFormat(m[1]) + '</p></div>';
      } else {
        html += '<div class="nr-component"><p class="nr-blockquote">' + inlineFormat(m[1]) + '</p></div>';
      }
      lastWasH1 = false;
      i++;
      continue;
    }

    // Sticker
    const stickerMatch = line.trim().match(/^!\[sticker\]\((.+?)\)/);
    if (stickerMatch) {
      html += renderSticker(stickerMatch[1]);
      lastWasH1 = false;
      i++;
      continue;
    }

    // Image (general) — supports ![alt|width](url)
    const imgMatch = line.trim().match(/^!\[([^\]]*)\]\((.+?)\)/);
    if (imgMatch) {
      const altFull = imgMatch[1] || '图片';
      const src = imgMatch[2];
      // Parse width from alt: "图片|60%" or "图片|200px"
      let alt = altFull, width = '100%';
      if (altFull.includes('|')) {
        const parts = altFull.split('|');
        alt = parts[0].trim() || '图片';
        width = parts[1].trim() || '100%';
      }
      html += `<div class="nr-component"><div style="text-align:center;"><img src="${src}" alt="${alt}" style="width:${width};max-width:100%;border-radius:8px;display:block;margin:0 auto;"></div></div>`;
      lastWasH1 = false;
      i++;
      continue;
    }

    // CTA
    const ctaMatch = line.trim().match(/^\[CTA:(.+?)\]\((.+?)\)\{(\w+)\}/);
    if (ctaMatch) {
      html += renderCTA(ctaMatch[1], ctaMatch[2], ctaMatch[3]);
      lastWasH1 = false;
      i++;
      continue;
    }

    // Regular paragraph
    html += '<div class="nr-component"><p class="nr-body">' + inlineFormat(line) + '</p></div>';
    lastWasH1 = false;
    i++;
  }

  document.getElementById('preview').innerHTML = html;

  // Re-apply font selections after render
  if (window._headingFont) {
    document.querySelectorAll('.nr-h1, .nr-h2').forEach(el => {
      el.style.fontFamily = window._headingFont;
    });
  }
  if (window._bodyFont) {
    document.querySelectorAll('.nr-body-text, .nr-subtitle').forEach(el => {
      el.style.fontFamily = window._bodyFont;
    });
  }
}

// ── Chat ──
function renderChat(lines) {
  let msgs = '';
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;

    let role, text;
    const colonIdx = trimmed.indexOf('：');
    const colonIdx2 = trimmed.indexOf(':');
    let splitIdx = -1;
    if (colonIdx !== -1 && colonIdx2 !== -1) splitIdx = Math.min(colonIdx, colonIdx2);
    else if (colonIdx !== -1) splitIdx = colonIdx;
    else if (colonIdx2 !== -1) splitIdx = colonIdx2;

    if (splitIdx !== -1) {
      role = trimmed.substring(0, splitIdx).trim().toLowerCase();
      text = trimmed.substring(splitIdx + (trimmed[splitIdx] === '：' ? 1 : 1)).trim();
    } else {
      continue;
    }

    const isMe = (role === '我' || role === 'me');
    const side = isMe ? 'right' : 'left';
    const name = isMe ? AUTHOR_NAME : AI_NAME;

    msgs += `<div class="nr-chat-row ${side}">
      <div class="nr-chat-name">${name}</div>
      <div class="nr-chat-bubble">${text}</div>
    </div>`;
  }

  return `<div class="nr-component"><div class="nr-chat">
    <div class="nr-chat-titlebar">
      <div class="nr-chat-dot red"></div>
      <div class="nr-chat-dot yellow"></div>
      <div class="nr-chat-dot green"></div>
      <div class="nr-chat-title">${AI_NAME} · Chat</div>
    </div>
    <div class="nr-chat-body">${msgs}</div>
  </div></div>`;
}

// ── Quote ──
function renderQuote(lines) {
  let label = '', text = '', source = '';
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith('label:')) label = trimmed.substring(6).trim();
    else if (trimmed.startsWith('text:')) text = trimmed.substring(5).trim();
    else if (trimmed.startsWith('source:')) source = trimmed.substring(7).trim();
  }

  return `<div class="nr-component"><div class="nr-quote">
    <div class="nr-quote-tag">${label}</div>
    <p class="nr-quote-text">${text}</p>
    <p class="nr-quote-source">${source}</p>
  </div></div>`;
}

// ── Terminal ──
function renderTerminal(lines) {
  let prompt = `${AI_NAME} --think`, text = '', footer = BRAND_NAME;
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith('prompt:')) prompt = trimmed.substring(7).trim();
    else if (trimmed.startsWith('text:')) text = trimmed.substring(5).trim();
    else if (trimmed.startsWith('footer:')) footer = trimmed.substring(7).trim();
  }

  return `<div class="nr-component"><div class="nr-terminal">
    <div class="nr-terminal-header">
      <div class="nr-terminal-dot"></div>
      <div class="nr-terminal-dot"></div>
      <div class="nr-terminal-dot"></div>
    </div>
    <div class="nr-terminal-body">
      <div class="nr-terminal-prompt"><span class="arrow">▸</span> ${prompt}</div>
      <span class="nr-terminal-quote">${text}</span><span class="nr-terminal-cursor"></span>
      <div class="nr-terminal-brand">${footer}</div>
    </div>
  </div></div>`;
}

// ── Sticker ──
function renderSticker(path) {
  const src = (!path || path === 'ip-avatar.jpg') ? STICKER_IMAGE : path;
  return `<div class="nr-component"><div class="nr-sticker">
    <img src="${src}" alt="${AUTHOR_NAME} 贴纸">
  </div></div>`;
}

// ── CTA ──
function renderCTA(text, url, variant) {
  const cls = variant === 'blue' ? 'cta-blue' : 'cta-yellow';
  return `<div class="nr-component"><div class="nr-cta">
    <a href="${url}" class="${cls}">${text} →</a>
  </div></div>`;
}

// ── Export (WeChat Sanitize) ──
function sanitizeForWechat(html) {
  // Remove animations
  html = html.replace(/animation[^;]*;/gi, '');
  html = html.replace(/@keyframes[^}]+\{[^}]*\}/gi, '');
  // Remove box-shadow
  html = html.replace(/box-shadow[^;]*;/gi, '');
  // linear-gradient → first color
  html = html.replace(/linear-gradient\([^)]*,\s*(#[0-9a-fA-F]{3,8})\s*\d*%?\)/gi, '$1');
  // display:flex → display:block (for WeChat)
  html = html.replace(/display\s*:\s*flex/gi, 'display:block');
  // flex-direction, align-self, align-items, gap — remove
  html = html.replace(/flex-direction[^;]*;/gi, '');
  html = html.replace(/align-self[^;]*;/gi, '');
  html = html.replace(/align-items[^;]*;/gi, '');
  html = html.replace(/gap[^;]*;/gi, '');
  // Keep border-radius
  return html;
}

function exportToClipboard() {
  const previewEl = document.getElementById('preview');

  // Clone & inline styles
  const clone = previewEl.cloneNode(true);

  // Remove cursor animation spans
  clone.querySelectorAll('.nr-terminal-cursor').forEach(el => {
    el.style.animation = '';
    el.style.opacity = '1';
  });

  let rawHtml = clone.innerHTML;
  let sanitized = sanitizeForWechat(rawHtml);

  // Copy as HTML to clipboard
  const blob = new Blob([sanitized], { type: 'text/html' });
  const plainBlob = new Blob([sanitized], { type: 'text/plain' });

  navigator.clipboard.write([
    new ClipboardItem({
      'text/html': blob,
      'text/plain': plainBlob
    })
  ]).then(() => {
    showToast('已复制！粘贴到公众号编辑器即可 ✓');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = sanitized;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制 HTML 到剪贴板 ✓');
  });
}

// ── Font Switching ──
const fontMap = {
  'huiwen': "'Huiwen Mincho', 'Noto Serif SC', serif",
  'noto-serif': "'Noto Serif SC', serif",
  'xiaolai': "'Xiaolai', 'Noto Sans SC', sans-serif",
  'noto-sans': "'Noto Sans SC', sans-serif",
};

function changeFont(target, value) {
  const preview = document.getElementById('preview');
  const family = fontMap[value] || fontMap['noto-sans'];
  if (target === 'heading') {
    preview.querySelectorAll('.nr-h1, .nr-h2').forEach(el => {
      el.style.fontFamily = family;
    });
    // Store for re-renders
    window._headingFont = family;
  } else {
    preview.querySelectorAll('.nr-body-text, .nr-subtitle').forEach(el => {
      el.style.fontFamily = family;
    });
    window._bodyFont = family;
  }
}

// ── Undo History ──
const undoStack = [];
const redoStack = [];
let lastSavedValue = '';

function saveUndoState() {
  const ed = document.getElementById('editor');
  if (ed.value !== lastSavedValue) {
    undoStack.push(lastSavedValue);
    if (undoStack.length > 50) undoStack.shift();
    redoStack.length = 0;
    lastSavedValue = ed.value;
  }
}

function doUndo() {
  const ed = document.getElementById('editor');
  if (undoStack.length === 0) return;
  redoStack.push(ed.value);
  const prev = undoStack.pop();
  ed.value = prev;
  lastSavedValue = prev;
  render();
  showToast('已撤回 ↩️');
}

// ── Image Upload ──
function insertImage() {
  document.getElementById('imageInput').click();
}

function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const dataUrl = e.target.result;
    // 弹出尺寸选择
    const size = prompt('图片宽度（可输入百分比或像素）：\n\n• 100% — 全宽\n• 60% — 中等\n• 40% — 小图\n• 200px — 固定像素\n\n直接回车默认 100%', '100%');
    const width = (size && size.trim()) ? size.trim() : '100%';

    const ed = document.getElementById('editor');
    const start = ed.selectionStart;
    const val = ed.value;
    const prefix = (start > 0 && val[start - 1] !== '\n') ? '\n\n' : (start > 0 ? '\n' : '');
    const imgMd = prefix + '![图片|' + width + '](' + dataUrl + ')\n';
    ed.value = val.substring(0, start) + imgMd + val.substring(ed.selectionEnd);
    ed.selectionStart = ed.selectionEnd = start + imgMd.length;
    saveUndoState();
    render();
    showToast('图片已插入（' + width + '）✓');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// ── Init ──
const editor = document.getElementById('editor');
editor.value = initialContent;
lastSavedValue = initialContent;

editor.addEventListener('input', function() {
  saveUndoState();
  debounce(render, 300)();
});

// Keyboard shortcuts
editor.addEventListener('keydown', function(e) {
  // Ctrl+Z / Cmd+Z → Undo
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    doUndo();
    return;
  }
  // Tab
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 2;
    saveUndoState();
  }
});

// Initial render
render();
</script>
